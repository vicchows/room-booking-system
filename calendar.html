<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - Room Booking System</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Navigation -->
<nav class="navbar">
  <div class="navbar-inner">
    <a class="navbar-brand" href="index.html">🏢 <span data-i18n="appName">Room Booking System</span></a>
    <div class="navbar-nav">
      <a class="nav-link" href="index.html" data-i18n="home">Home</a>
      <a class="nav-link active" href="calendar.html" data-i18n="calendar">Calendar</a>
      <a class="nav-link" href="reports.html" data-i18n="reports">Reports</a>
      <a class="nav-link" href="admin.html" data-i18n="admin">Admin</a>
    </div>
    <div class="navbar-actions">
      <div id="theme-switcher"></div>
      <div id="lang-switcher"></div>
      <div id="nav-user-info" class="nav-user-info" style="display:none"></div>
      <button id="btn-login-m365" class="btn btn-primary btn-sm" onclick="MSALAuth.login()">
        🔐 <span data-i18n="loginM365">Login with Microsoft 365</span>
      </button>
      <button id="btn-logout" class="btn btn-secondary btn-sm" onclick="MSALAuth.logout()" style="display:none">
        <span data-i18n="logout">Logout</span>
      </button>
    </div>
  </div>
</nav>

<!-- Main Content -->
<div class="main-content">
  <!-- Back link -->
  <button class="back-link" onclick="history.back()">← <span data-i18n="home">Home</span></button>

  <!-- Room Header -->
  <div id="room-header"></div>

  <!-- Calendar Layout -->
  <div class="calendar-layout">
    <!-- Calendar -->
    <div>
      <div class="calendar-wrapper">
        <div class="calendar-nav">
          <button class="btn btn-ghost" style="color:white" onclick="CALENDAR.prevMonth()">◀ <span data-i18n="previousMonth">Prev</span></button>
          <h3 id="calendar-month-label"></h3>
          <button class="btn btn-ghost" style="color:white" onclick="CALENDAR.nextMonth()"><span data-i18n="nextMonth">Next</span> ▶</button>
        </div>
        <div style="padding: var(--space-2) var(--space-4); text-align:right">
          <button class="btn btn-sm btn-secondary" onclick="CALENDAR.goToday()" data-i18n="today">Today</button>
        </div>
        <div id="calendar-grid"></div>
      </div>
    </div>

    <!-- Day Panel -->
    <div id="day-panel" class="day-panel"></div>
  </div>
</div>

<!-- Scripts -->
<script src="data/sample-data.js"></script>
<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/email.js"></script>
<script src="js/msal-auth.js"></script>
<script src="js/app.js"></script>
<script src="js/calendar.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    CALENDAR.init();
  });
</script>
</body>
</html>
